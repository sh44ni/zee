<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zee</title>
    <!-- Local Fonts -->
    <link rel="stylesheet" href="/fonts/fonts.css">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <!-- Animated background layers -->
    <div class="bg-layer bg-gradient"></div>
    <div class="bg-layer bg-noise"></div>

    <header class="glass-header">
        <div class="container header-content">
            <div class="brand" id="brand-header">
                <span class="brand-name">Zee</span>
                <span class="brand-phase">· midnight</span>
            </div>
            <div class="header-actions">
                <button class="icon-btn" id="btn-browse" title="Browse Constellation (B)">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon></svg>
                </button>
                <button class="icon-btn" id="btn-stats" title="Data Canvas (S)">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
                </button>
                <button class="icon-btn" id="btn-new" title="New Thought (⌘N)">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </button>
                <button class="icon-btn" id="btn-logout" title="Disconnect">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                </button>
            </div>
        </div>
    </header>

    <!-- Constellation View -->
    <main id="view-constellation" class="view active">
        <div class="constellation-wrapper">
            <svg id="constellation-svg"></svg>
            <div id="empty-state" class="empty-state" style="display: none;">
                <h2 class="poetry-text"></h2>
            </div>
        </div>
    </main>

    <!-- Chat View -->
    <main id="view-chat" class="view">
        <div class="chat-container">
            <div id="messages" class="messages"></div>
        </div>
        <div class="input-area">
            <div class="glass-pill">
                <span class="input-prefix"></span>
                <textarea id="chat-input" placeholder="Type a thought..." rows="1"></textarea>
                <button class="send-btn" id="btn-send" title="Send">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </div>
    </main>

    <!-- Stats View -->
    <main id="view-stats" class="view container">
        <h2 class="stats-header glow-text">Mind Canvas</h2>
        
        <div class="stats-grid">
            <div class="stat-card glass-panel">
                <div class="stat-value gradient-text" id="stat-convs">-</div>
                <div class="stat-label">Constellations</div>
            </div>
            <div class="stat-card glass-panel">
                <div class="stat-value gradient-text" id="stat-msgs">-</div>
                <div class="stat-label">Exchanges</div>
            </div>
            <div class="stat-card glass-panel">
                <div class="stat-value gradient-text" id="stat-words">-</div>
                <div class="stat-label">Est. Words</div>
            </div>
        </div>

        <div class="stats-art-container glass-panel">
            <svg id="stats-svg"></svg>
        </div>
    </main>

    <!-- Command Palette -->
    <div id="palette-overlay" class="palette-overlay">
        <div class="palette glass-panel">
            <div class="palette-search-wrapper">
                <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" id="palette-input" class="palette-input" placeholder="Search constellations or commands...">
            </div>
            <div id="palette-results" class="palette-results"></div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast glass-panel"></div>

    <script src="/app.js"></script>
</body>
</html>
