<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#7045f7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Zbeta — Sign in</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/branding/Zbetalogo_favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/branding/Zbetalogo_favicon.svg">
    <link rel="stylesheet" href="/fonts/fonts.css">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="bg-layer bg-gradient"></div>
    <div class="bg-layer bg-noise"></div>
    <div class="login-wrap container">
        <div class="login-brand-block">
            <img src="/branding/Zbetalogo_logo.svg" alt="Zbeta" class="login-logo">
            <h1 class="login-title visually-hidden">Zbeta</h1>
            <p class="login-subtitle" id="statusText">Personal AI with jokes, grit, and gradient energy.</p>
        </div>

        <form id="loginForm" class="login-form glass-panel">
            <input type="email" id="email" class="login-input" placeholder="Your email" required autofocus>
            <button type="submit" class="btn" id="submitBtn">Send magic link</button>
        </form>

        <div id="messageArea" class="login-message glass-panel" style="display: none;">
            <p>If that email is registered, a link has been sent.</p>
            <p class="login-message-sub">Peek your inbox (and spam, just in case).</p>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const error = urlParams.get('error');
        const statusText = document.getElementById('statusText');
        if (error === 'invalid') {
            statusText.textContent = 'That link looks broken.';
            statusText.style.color = '#ff8a8a';
        } else if (error === 'expired') {
            statusText.textContent = 'Link expired — grab a fresh one below.';
            statusText.style.color = '#ff8a8a';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const btn = document.getElementById('submitBtn');

            btn.disabled = true;
            btn.textContent = 'Sending…';

            try {
                const res = await fetch('/auth/request-link', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                if (res.ok) {
                    document.getElementById('loginForm').style.display = 'none';
                    document.getElementById('messageArea').style.display = 'block';
                } else {
                    throw new Error('Failed to request');
                }
            } catch (err) {
                btn.disabled = false;
                btn.textContent = 'Send magic link';
                statusText.textContent = 'Something glitched — try again.';
            }
        });
    </script>
</body>
</html>
